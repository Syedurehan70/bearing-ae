# Dense autoencoder over log magnitude spectra. Primary configuration.
seed: 1337
device: auto

data:
  # Directories searched recursively for CWRU .mat files.
  # Kaggle: whatever /kaggle/input/<slug> your chosen mirror mounts at.
  roots:
    - /kaggle/input
    - data/raw
  channel: DE          # drive-end accelerometer
  # Case-insensitive substring filters on the full path. Several mirrors ship
  # 12 kHz and 48 kHz recordings side by side; mixing sampling rates silently
  # corrupts every spectral feature. Set these once you have seen the layout.
  include: []          # e.g. ["12k", "Normal"]
  exclude: []          # e.g. ["48k_DE"] to drop the 48 kHz fault recordings

  # CWRU stores no sampling rate inside the .mat files, and the archive mixes
  # two: 12 kHz drive-end fault data, 48 kHz healthy baseline data. Everything
  # is resampled to target_rate before any feature is computed. Verify the
  # printed durations look sane (~5-25 s) before trusting a single metric.
  target_rate: 12000
  sample_rate:
    default: 12000
    normal_baseline: 48000       # healthy runs, unless a path rule matches
    path_rules:
      "48k": 48000
      "48khz": 48000

features:
  representation: logspec   # logspec | raw
  window: 2048              # samples @ 12 kHz -> ~171 ms, several shaft revolutions
  hop: 1024                 # 50% overlap

model:
  kind: dense               # dense | conv
  hidden: [256, 64]
  latent: 16

training:
  epochs: 60
  batch_size: 128
  lr: 0.001
  patience: 8
  min_delta: 1.0e-5

experiment:
  train_load: 0             # motor load (hp) the healthy training data comes from
  val_fraction: 0.2         # healthy split used for early stopping AND thresholding
  threshold_quantile: 0.99  # set on healthy validation windows only
  run_kurtosis_baseline: true
